syntax = "proto3";

package platform_context_graph.data_plane.reducer.v1;

option go_package = "github.com/platformcontext/platform-context-graph/go/gen/proto/platform_context_graph/data_plane/reducer/v1;reducerv1";

import "google/protobuf/timestamp.proto";

message ReducerIntent {
  string intent_id = 1;
  string scope_id = 2;
  string generation_id = 3;
  string reducer_domain = 4;
  string cause = 5;
  int32 priority = 6;
  google.protobuf.Timestamp scheduled_at = 7;
  google.protobuf.Timestamp enqueued_at = 8;
  repeated string affected_entity_keys = 9;
}

message ReducerResult {
  string intent_id = 1;
  string scope_id = 2;
  string generation_id = 3;
  string reducer_domain = 4;
  ReducerResultStatus status = 5;
  string evidence_summary = 6;
  google.protobuf.Timestamp started_at = 7;
  google.protobuf.Timestamp completed_at = 8;
  repeated string notes = 9;
}

enum ReducerResultStatus {
  REDUCER_RESULT_STATUS_UNSPECIFIED = 0;
  REDUCER_RESULT_STATUS_SUCCEEDED = 1;
  REDUCER_RESULT_STATUS_PARTIAL = 2;
  REDUCER_RESULT_STATUS_FAILED = 3;
  REDUCER_RESULT_STATUS_SKIPPED = 4;
}
