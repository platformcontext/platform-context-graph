{{- if and .Values.mcpServer.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pcg.mcpServerMetricsServiceName" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  type: ClusterIP
  selector:
    {{- include "pcg.mcpServerSelectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.observability.prometheus.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
