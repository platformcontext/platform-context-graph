{{- if .Values.mcpServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pcg.mcpServerFullname" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "pcg.mcpServerSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
{{- end }}
