{{- if and .Values.observability.prometheus.enabled .Values.observability.prometheus.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pcg.apiMetricsServiceName" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- with .Values.observability.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "pcg.labels" . | nindent 6 }}
      app.kubernetes.io/component: api
  endpoints:
    - port: metrics
      path: {{ .Values.observability.prometheus.path | quote }}
      interval: {{ .Values.observability.prometheus.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.observability.prometheus.serviceMonitor.scrapeTimeout | quote }}
---
{{- if .Values.repoSync.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pcg.ingestorMetricsServiceName" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestor
    {{- with .Values.observability.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "pcg.labels" . | nindent 6 }}
      app.kubernetes.io/component: ingestor
  endpoints:
    - port: metrics
      path: {{ .Values.observability.prometheus.path | quote }}
      interval: {{ .Values.observability.prometheus.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.observability.prometheus.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
---
{{- if .Values.resolutionEngine.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pcg.resolutionEngineMetricsServiceName" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: resolution-engine
    {{- with .Values.observability.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "pcg.labels" . | nindent 6 }}
      app.kubernetes.io/component: resolution-engine
  endpoints:
    - port: metrics
      path: {{ .Values.observability.prometheus.path | quote }}
      interval: {{ .Values.observability.prometheus.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.observability.prometheus.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
{{- end }}
