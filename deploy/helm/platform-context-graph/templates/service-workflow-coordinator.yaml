{{- if .Values.workflowCoordinator.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pcg.workflowCoordinatorMetricsServiceName" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflow-coordinator
spec:
  type: ClusterIP
  selector:
    {{- include "pcg.workflowCoordinatorSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    {{- if .Values.observability.prometheus.enabled }}
    - name: metrics
      port: {{ .Values.observability.prometheus.port }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
{{- end }}
