{{- if .Values.repoSync.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pcg.fullname" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  serviceName: {{ include "pcg.workerHeadlessServiceName" . }}
  selector:
    matchLabels:
      {{- include "pcg.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pcg.workerSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pcg.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: repo-sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pcg", "internal", "repo-sync-loop"]
          env:
            - name: PCG_RUNTIME_ROLE
              value: "worker"
            - name: PCG_HOME
              value: /data/.platform-context-graph
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PCG_REPOS_DIR
              value: /data/repos
            - name: PCG_REPO_SOURCE_MODE
              value: {{ .Values.repoSync.source.mode | quote }}
            - name: PCG_GIT_AUTH_METHOD
              value: {{ .Values.repoSync.auth.method | quote }}
            - name: PCG_GITHUB_ORG
              value: {{ .Values.repoSync.source.githubOrg | quote }}
            - name: PCG_REPOSITORIES
              value: {{ join "," .Values.repoSync.source.repositories | quote }}
            - name: PCG_REPOSITORY_RULES_JSON
              value: {{ toJson .Values.repoSync.source.rules | quote }}
            - name: PCG_FILESYSTEM_ROOT
              value: {{ .Values.repoSync.source.filesystemRoot | quote }}
            - name: PCG_CLONE_DEPTH
              value: {{ .Values.repoSync.source.cloneDepth | quote }}
            - name: PCG_REPO_LIMIT
              value: {{ .Values.repoSync.source.limit | quote }}
            - name: PCG_REPO_SYNC_INITIAL_DELAY_SECONDS
              value: {{ .Values.repoSync.initialDelaySeconds | quote }}
            - name: PCG_REPO_SYNC_INTERVAL_SECONDS
              value: {{ .Values.repoSync.intervalSeconds | quote }}
            - name: NEO4J_URI
              value: {{ .Values.neo4j.uri | quote }}
            {{- include "pcg.renderContentStoreEnv" . | nindent 12 }}
            {{- include "pcg.renderOtelEnv" . | nindent 12 }}
            - name: NEO4J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.neo4j.auth.secretName }}
                  key: {{ .Values.neo4j.auth.usernameKey }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.neo4j.auth.secretName }}
                  key: {{ .Values.neo4j.auth.passwordKey }}
            {{- include "pcg.renderEnvMap" .Values.env | nindent 12 }}
            {{- if eq .Values.repoSync.auth.method "githubApp" }}
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repoSync.auth.githubApp.secretName }}
                  key: {{ .Values.repoSync.auth.githubApp.appIdKey }}
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repoSync.auth.githubApp.secretName }}
                  key: {{ .Values.repoSync.auth.githubApp.installationIdKey }}
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repoSync.auth.githubApp.secretName }}
                  key: {{ .Values.repoSync.auth.githubApp.privateKeyKey }}
            {{- else if eq .Values.repoSync.auth.method "token" }}
            - name: PCG_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.repoSync.auth.token.secretName }}
                  key: {{ .Values.repoSync.auth.token.tokenKey }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: pcgignore
              mountPath: /data/repos/.pcgignore
              subPath: .pcgignore
              readOnly: true
            {{- if eq .Values.repoSync.auth.method "ssh" }}
            - name: ssh-auth
              mountPath: /var/run/secrets/pcg-ssh
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: pcgignore
          configMap:
            name: {{ include "pcg.fullname" . }}-pcgignore
        {{- if and .Values.worker.persistence.enabled .Values.worker.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pcg.dataClaimName" . }}
        {{- else if not .Values.worker.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if eq .Values.repoSync.auth.method "ssh" }}
        - name: ssh-auth
          secret:
            secretName: {{ .Values.repoSync.auth.ssh.secretName }}
            defaultMode: 0400
            items:
              - key: {{ .Values.repoSync.auth.ssh.privateKeyKey }}
                path: id_rsa
              - key: {{ .Values.repoSync.auth.ssh.knownHostsKey }}
                path: known_hosts
        {{- end }}
  {{- if and .Values.worker.persistence.enabled (not .Values.worker.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "pcg.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.worker.persistence.accessModes | nindent 10 }}
        {{- if .Values.worker.persistence.storageClass }}
        storageClassName: {{ .Values.worker.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.worker.persistence.size }}
  {{- end }}
{{- end }}
