{{- if .Values.exposure.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "pcg.fullname" . }}
  labels:
    {{- include "pcg.labels" . | nindent 4 }}
spec:
  {{- with .Values.exposure.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  parentRefs:
    {{- range .Values.exposure.gateway.parentRefs }}
    - group: {{ .group | default "gateway.networking.k8s.io" }}
      kind: {{ .kind | default "Gateway" }}
      name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "pcg.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
