image:
  repository: ghcr.io/platformcontext/platform-context-graph
  tag: "v0.0.49"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

initContainerSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  annotations: {}

networkPolicy:
  enabled: true

apiAuth:
  secretName: pcg-api-auth
  key: api-key

api:
  replicas: 1
  revisionHistoryLimit: 3
  connectionTuning:
    postgres:
      maxOpenConns: ""
      maxIdleConns: ""
      connMaxLifetime: ""
      connMaxIdleTime: ""
      pingTimeout: ""
    neo4j:
      maxConnectionPoolSize: ""
      maxConnectionLifetime: ""
      connectionAcquisitionTimeout: ""
      socketConnectTimeout: ""
      verifyTimeout: ""
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi

resolutionEngine:
  enabled: true
  replicas: 1
  revisionHistoryLimit: 3
  connectionTuning:
    postgres:
      maxOpenConns: ""
      maxIdleConns: ""
      connMaxLifetime: ""
      connMaxIdleTime: ""
      pingTimeout: ""
    neo4j:
      maxConnectionPoolSize: ""
      maxConnectionLifetime: ""
      connectionAcquisitionTimeout: ""
      socketConnectTimeout: ""
      verifyTimeout: ""
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi

exposure:
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  gateway:
    enabled: false
    hostnames: []
    parentRefs: []

ingester:
  replicas: 1
  revisionHistoryLimit: 3
  connectionTuning:
    postgres:
      maxOpenConns: ""
      maxIdleConns: ""
      connMaxLifetime: ""
      connMaxIdleTime: ""
      pingTimeout: ""
    neo4j:
      maxConnectionPoolSize: ""
      maxConnectionLifetime: ""
      connectionAcquisitionTimeout: ""
      socketConnectTimeout: ""
      verifyTimeout: ""
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 100Gi
    storageClass: ""
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi

env:
  DEFAULT_DATABASE: neo4j
  NEO4J_DATABASE: neo4j
  PCG_ENABLE_PUBLIC_DOCS: "false"
  INDEX_VARIABLES: "false"
  PCG_MAX_CALLS_PER_FILE: "50"

contentStore:
  dsn: ""

observability:
  environment: ""
  otel:
    enabled: false
    endpoint: ""
    protocol: grpc
    insecure: true
    headers: {}
    tracesExporter: otlp
    metricsExporter: otlp
    logsExporter: none
    resourceAttributes: {}
    excludedUrls:
      - /health
      - /api/v0/health
      - /api/v0/openapi.json
      - /api/v0/docs
      - /api/v0/redoc
    metricExportIntervalSeconds: 30
  prometheus:
    enabled: false
    host: 0.0.0.0
    port: 9464
    path: /metrics
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

neo4j:
  uri: bolt://neo4j:7687
  auth:
    secretName: pcg-neo4j
    usernameKey: username
    passwordKey: password

repoSync:
  enabled: true
  bootstrap: true
  initialDelaySeconds: 0
  intervalSeconds: 900
  source:
    mode: githubOrg
    githubOrg: platformcontext
    repositories: []
    rules: []
    filesystemRoot: /fixtures
    cloneDepth: 1
    limit: 4000
  auth:
    method: githubApp
    githubApp:
      secretName: github-app-credentials
      appIdKey: app-id
      installationIdKey: installation-id
      privateKeyKey: private-key
    token:
      secretName: github-token
      tokenKey: token
    ssh:
      secretName: github-ssh
      privateKeyKey: id_rsa
      knownHostsKey: known_hosts

pcgignore: |
  # Python
  __pycache__/
  *.py[cod]
  .venv/
  env/
  venv/
  .tox/
  .nox/
  .pytest_cache/
  .mypy_cache/
  .ruff_cache/
  .pyre/
  .hypothesis/
  .ipynb_checkpoints/
  .eggs/
  *.egg-info/
  htmlcov/
  coverage.xml

  # JavaScript / TypeScript
  node_modules/
  bower_components/
  jspm_packages/
  .npm/
  .pnpm-store/
  .yarn/
  .parcel-cache/
  .next/
  .nuxt/
  .svelte-kit/
  .docusaurus/
  .vite/
  *.tsbuildinfo

  # JVM / Kotlin / Scala / Groovy
  .gradle/
  .m2/
  .bloop/
  .metals/
  .bsp/
  .kotlin/
  *.class

  # Go
  *.test
  *.coverprofile
  coverage.out
  profile.cov

  # PHP / Ruby
  composer.phar
  .bundle/
  vendor/bundle/

  # Rust
  target/

  # .NET / C#
  packages/
  obj/
  .vs/
  TestResult*/
  *.trx

  # Swift / Apple
  .build/
  .swiftpm/
  xcuserdata/
  Carthage/Build/
  fastlane/report.xml
  fastlane/Preview.html
  fastlane/test_output

  # Elixir
  _build/
  deps/
  cover/
  .elixir_ls/
  erl_crash.dump

  # Dart / Flutter
  .dart_tool/
  .flutter-plugins
  .flutter-plugins-dependencies

  # Haskell
  dist-newstyle/
  .stack-work/
  .hpc/

  # Perl
  blib/
  .build/
  .carmel/

  # C / C++
  CMakeFiles/
  CMakeCache.txt
  cmake_install.cmake
  *.dSYM/

  # IDEs and editors
  .idea/
  .vscode/
  *.swp
  *.swo

  # Git and IaC cache directories
  .git/
  .terraform/
  .terragrunt-cache/
  .terramate-cache/
  .crossplane/
  .pulumi/
  cdk.out/
  .serverless/
  .aws-sam/
  *.tfstate
  *.tfstate.*
  .terraform.tfstate.lock.info
  *.tfvars
  *.tfvars.json
  override.tf
  override.tf.json
  *_override.tf
  *_override.tf.json
  *tfplan*
  crash.log
  crash.*.log
  charts/*.tgz

  # Build artifacts and output
  dist/
  build/
  out/
  coverage/

  # Minified and generated files
  *.min.js
  *.min.css
  *.min.json
  *.bundle.js
  *.chunk.js
  *.min.map
  *.js.map
  *.css.map

  # Coverage, databases, and temp data
  *.log
  *.sqlite3
  *.db
  *.tmp
  *.temp
  *.bak

nodeSelector: {}
tolerations: []
affinity: {}
