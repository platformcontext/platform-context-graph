image:
  repository: ghcr.io/platformcontext/platform-context-graph
  tag: "v0.0.42"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  annotations: {}

networkPolicy:
  enabled: true

apiAuth:
  secretName: pcg-api-auth
  key: api-key

api:
  replicas: 1
  revisionHistoryLimit: 3
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi

resolutionEngine:
  enabled: true
  replicas: 1
  revisionHistoryLimit: 3
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi

exposure:
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  gateway:
    enabled: false
    hostnames: []
    parentRefs: []

ingester:
  replicas: 1
  revisionHistoryLimit: 3
  persistence:
    enabled: true
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 100Gi
    storageClass: ""
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 16Gi

env:
  DEFAULT_DATABASE: neo4j
  NEO4J_DATABASE: neo4j
  PCG_LOG_FORMAT: json
  LIBRARY_LOG_LEVEL: WARNING
  LOG_FILE_PATH: ""
  PCG_ENABLE_PUBLIC_DOCS: "false"
  INDEX_VARIABLES: "false"
  PCG_MAX_CALLS_PER_FILE: "50"

contentStore:
  dsn: ""

observability:
  environment: ""
  otel:
    enabled: false
    endpoint: ""
    protocol: grpc
    insecure: true
    headers: {}
    tracesExporter: otlp
    metricsExporter: otlp
    logsExporter: none
    resourceAttributes: {}
    excludedUrls:
      - /health
      - /api/v0/health
      - /api/v0/openapi.json
      - /api/v0/docs
      - /api/v0/redoc
    metricExportIntervalSeconds: 30
  prometheus:
    enabled: false
    host: 0.0.0.0
    port: 9464
    path: /metrics
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

neo4j:
  uri: bolt://neo4j:7687
  auth:
    secretName: pcg-neo4j
    usernameKey: username
    passwordKey: password

repoSync:
  enabled: true
  bootstrap: true
  initialDelaySeconds: 0
  intervalSeconds: 900
  source:
    mode: githubOrg
    githubOrg: platformcontext
    repositories: []
    rules: []
    filesystemRoot: /fixtures
    cloneDepth: 1
    limit: 4000
  auth:
    method: githubApp
    githubApp:
      secretName: github-app-credentials
      appIdKey: app-id
      installationIdKey: installation-id
      privateKeyKey: private-key
    token:
      secretName: github-token
      tokenKey: token
    ssh:
      secretName: github-ssh
      privateKeyKey: id_rsa
      knownHostsKey: known_hosts

pcgignore: |
  # Python
  __pycache__/
  *.pyc
  *.pyo
  *.pyd
  .Python
  .venv/
  env/
  venv/

  # Node / JavaScript
  node_modules/
  bower_components/
  .npm/
  .yarn/

  # Python packaging
  *.egg-info/
  *.egg/
  .eggs/

  # Java / JVM
  .gradle/
  .m2/
  *.class
  *.jar

  # Ruby
  .bundle/

  # Go
  vendor/

  # PHP
  vendor/

  # .NET / C#
  packages/
  bin/
  obj/

  # Rust
  target/

  # IDEs and editors
  .idea/
  .vscode/
  *.swp
  *.swo

  # Git and IaC cache directories
  .git/
  .terraform/
  .terragrunt-cache/
  .terramate-cache/
  .crossplane/
  .pulumi/
  cdk.out/
  .serverless/
  .aws-sam/

  # Build artifacts and output
  dist/
  build/
  out/

  # Vendored and third-party dependencies
  third_party/
  third-party/
  externals/

  # Minified and generated files
  *.min.js
  *.min.css
  *.bundle.js
  *.chunk.js
  *.min.map

  # Coverage, databases, and temp data
  .pytest_cache/
  coverage/
  htmlcov/
  *.log
  *.sqlite3
  *.db
  *.tmp
  *.temp

nodeSelector: {}
tolerations: []
affinity: {}
