apiVersion: v1
kind: ConfigMap
metadata:
  name: pcg-config
  namespace: platform-context-graph
data:
  PCG_HOME: /data/.platform-context-graph
  PYTHONUNBUFFERED: "1"
  DEFAULT_DATABASE: neo4j
  NEO4J_URI: bolt://external-neo4j:7687
  PCG_CONTENT_STORE_DSN: postgresql://pcg:replace-me@external-postgres:5432/platform_context_graph
  PCG_POSTGRES_DSN: postgresql://pcg:replace-me@external-postgres:5432/platform_context_graph
  PCG_POSTGRES_MAX_OPEN_CONNS: "20"
  PCG_POSTGRES_MAX_IDLE_CONNS: "5"
  PCG_POSTGRES_CONN_MAX_LIFETIME: 30m
  PCG_POSTGRES_CONN_MAX_IDLE_TIME: 10m
  PCG_POSTGRES_PING_TIMEOUT: 10s
  PCG_NEO4J_MAX_CONNECTION_POOL_SIZE: "100"
  PCG_NEO4J_MAX_CONNECTION_LIFETIME: 1h
  PCG_NEO4J_CONNECTION_ACQUISITION_TIMEOUT: 1m
  PCG_NEO4J_SOCKET_CONNECT_TIMEOUT: 5s
  PCG_NEO4J_VERIFY_TIMEOUT: 10s
  PCG_REPOSITORY_RULES_JSON: "[]"
