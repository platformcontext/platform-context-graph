serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/platform-context-graph

service:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internal

exposure:
  ingress:
    enabled: true
    className: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/target-type: ip
    hosts:
      - host: pcg.internal.example.com
        paths:
          - path: /
            pathType: Prefix
