apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pcg-neo4j
  namespace: platform-context-graph
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: pcg-neo4j
  data:
    - secretKey: username
      remoteRef:
        key: platform-context-graph/neo4j
        property: username
    - secretKey: password
      remoteRef:
        key: platform-context-graph/neo4j
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app-credentials
  namespace: platform-context-graph
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: github-app-credentials
  data:
    - secretKey: app-id
      remoteRef:
        key: platform-context-graph/github-app
        property: app_id
    - secretKey: installation-id
      remoteRef:
        key: platform-context-graph/github-app
        property: installation_id
    - secretKey: private-key
      remoteRef:
        key: platform-context-graph/github-app
        property: private_key
