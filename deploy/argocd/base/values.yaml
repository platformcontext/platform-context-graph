image:
  repository: ghcr.io/platformcontext/platform-context-graph
  tag: "v0.0.33"

env:
  PCG_LOG_FORMAT: json

neo4j:
  uri: bolt://neo4j.platform.svc.cluster.local:7687
  auth:
    secretName: pcg-neo4j
    usernameKey: username
    passwordKey: password

contentStore:
  dsn: postgresql://pcg:replace-me@postgres.platform.svc.cluster.local:5432/platform_context_graph

repoSync:
  enabled: true
  source:
    mode: githubOrg
    githubOrg: platformcontext
    rules: []
  auth:
    method: githubApp
    githubApp:
      secretName: github-app-credentials

service:
  type: ClusterIP

api:
  replicas: 1

resolutionEngine:
  enabled: true
  replicas: 1

observability:
  environment: ""
  otel:
    enabled: false
    endpoint: ""
    protocol: grpc
    insecure: true
    headers: {}
    tracesExporter: otlp
    metricsExporter: otlp
    logsExporter: none
    resourceAttributes: {}
    excludedUrls:
      - /health
      - /api/v0/health
      - /api/v0/openapi.json
      - /api/v0/docs
      - /api/v0/redoc
    metricExportIntervalSeconds: 30

ingester:
  replicas: 1
  persistence:
    enabled: true

exposure:
  ingress:
    enabled: false
  gateway:
    enabled: false
