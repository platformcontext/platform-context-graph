name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Debug info
        run: |
          uname -a
          go version
          df -h

      - name: Build Go CLI
        working-directory: go
        run: CGO_ENABLED=1 go build -o pcg ./cmd/pcg

      - name: Run Go tests
        working-directory: go
        run: go test ./... -count=1 -timeout 300s

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-logs
          path: |
            ~/.platform-context-graph
            *.log
