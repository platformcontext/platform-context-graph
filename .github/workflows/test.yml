name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build all Go binaries
        working-directory: go
        run: go build ./...

      - name: Run Go tests with race detector
        working-directory: go
        run: go test ./... -count=1 -race -timeout 300s

      - name: Lint Helm chart
        run: helm lint deploy/helm/platform-context-graph

      - name: Verify docs build
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions
          mkdocs build --strict --clean --config-file docs/mkdocs.yml

      - name: Check whitespace hygiene
        run: git diff --check HEAD~1 || true
