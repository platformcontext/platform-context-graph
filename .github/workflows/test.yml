name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install .[dev]

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build package
        run: python -m build

      - name: Enforce Python module length policy
        run: python scripts/check_python_file_lengths.py

      - name: Enforce Python docstring policy
        run: python scripts/check_python_docstrings.py

      - name: Run Unit and Integration Tests
        run: |
          chmod +x tests/run_tests.sh
          ./tests/run_tests.sh fast

      - name: Run Deployment Asset Tests
        run: |
          PYTHONPATH=src python -m pytest tests/integration/deployment/test_public_deployment_assets.py -q
