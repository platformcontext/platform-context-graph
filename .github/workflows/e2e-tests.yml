name: End-to-end Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build Go binaries
        working-directory: go
        run: |
          CGO_ENABLED=1 go build -o /usr/local/bin/pcg-bootstrap-index ./cmd/bootstrap-index
          CGO_ENABLED=1 go build -o /usr/local/bin/pcg-api ./cmd/api
          CGO_ENABLED=1 go build -o /usr/local/bin/pcg-ingester ./cmd/ingester
          CGO_ENABLED=1 go build -o /usr/local/bin/pcg-reducer ./cmd/reducer

      - name: Start Docker-backed Neo4j and Postgres
        env:
          PCG_NEO4J_PASSWORD: change-me
          PCG_POSTGRES_PASSWORD: change-me
        run: docker compose up -d neo4j postgres

      - name: Wait for Neo4j and Postgres
        env:
          PCG_NEO4J_PASSWORD: change-me
          PCG_POSTGRES_PASSWORD: change-me
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p "${PCG_NEO4J_PASSWORD}" "RETURN 1" >/dev/null 2>&1 && \
               docker compose exec -T postgres pg_isready -U pcg -d platform_context_graph >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs neo4j
          docker compose logs postgres
          exit 1

      - name: Run bootstrap-index against fixture ecosystems
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: change-me
          DEFAULT_DATABASE: neo4j
          PCG_CONTENT_STORE_DSN: postgresql://pcg:change-me@localhost:15432/platform_context_graph
          PCG_POSTGRES_DSN: postgresql://pcg:change-me@localhost:15432/platform_context_graph
          PCG_HOME: /tmp/.platform-context-graph
          PCG_REPOS_DIR: /tmp/repos
          PCG_REPO_SOURCE_MODE: filesystem
          PCG_FILESYSTEM_ROOT: ./tests/fixtures/ecosystems
          PCG_GIT_AUTH_METHOD: none
          PCG_REPOSITORY_RULES_JSON: "[]"
        run: |
          mkdir -p /tmp/repos
          pcg-bootstrap-index

      - name: Verify API health
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: change-me
          DEFAULT_DATABASE: neo4j
          PCG_CONTENT_STORE_DSN: postgresql://pcg:change-me@localhost:15432/platform_context_graph
          PCG_POSTGRES_DSN: postgresql://pcg:change-me@localhost:15432/platform_context_graph
          PCG_HOME: /tmp/.platform-context-graph
          PCG_REPOS_DIR: /tmp/repos
          PCG_RUNTIME_ROLE: api
          PCG_AUTO_GENERATE_API_KEY: "true"
        run: |
          pcg-api &
          API_PID=$!
          sleep 3
          curl -fsS http://localhost:8080/healthz
          curl -fsS http://localhost:8080/readyz
          kill $API_PID || true

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v
