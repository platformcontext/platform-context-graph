name: End-to-end Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Start Docker-backed Neo4j
      env:
        PCG_NEO4J_PASSWORD: change-me
      run: |
        docker compose up -d neo4j

    - name: Wait for Neo4j
      env:
        PCG_NEO4J_PASSWORD: change-me
      run: |
        for i in {1..60}; do
          if docker compose exec -T neo4j cypher-shell -u neo4j -p "${PCG_NEO4J_PASSWORD}" "RETURN 1" >/dev/null 2>&1; then
            exit 0
          fi
          sleep 2
        done
        docker compose logs neo4j
        exit 1

    - name: Seed e2e graph fixtures
      env:
        DATABASE_TYPE: neo4j
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USERNAME: neo4j
        NEO4J_PASSWORD: change-me
      run: |
        python scripts/seed_e2e_graph.py

    - name: Run end-to-end tests
      env:
        DATABASE_TYPE: neo4j
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USERNAME: neo4j
        NEO4J_PASSWORD: change-me
      run: |
        chmod +x tests/run_tests.sh
        ./tests/run_tests.sh e2e

    - name: Tear down Docker-backed Neo4j
      if: always()
      run: |
        docker compose down -v
