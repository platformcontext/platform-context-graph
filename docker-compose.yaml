services:
  neo4j:
    image: neo4j:2026-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${PCG_NEO4J_PASSWORD:-change-me}
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${PCG_NEO4J_PASSWORD:-change-me}", "RETURN 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT:-9464}:9464"
    depends_on:
      - jaeger

  postgres:
    image: postgres:18-alpine
    ports:
      - "${PCG_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: platform_context_graph
      POSTGRES_USER: pcg
      POSTGRES_PASSWORD: ${PCG_POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcg -d platform_context_graph"]
      interval: 5s
      timeout: 5s
      retries: 10

  bootstrap-index:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pcg", "internal", "bootstrap-index"]
    healthcheck:
      disable: true
    environment:
      DEFAULT_DATABASE: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${PCG_NEO4J_PASSWORD:-change-me}
      PCG_CONTENT_STORE_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_POSTGRES_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_HOME: /data/.platform-context-graph
      PCG_REPOS_DIR: /data/repos
      PCG_REPO_SOURCE_MODE: filesystem
      PCG_FILESYSTEM_ROOT: /fixtures
      PCG_GIT_AUTH_METHOD: none
      PCG_REPOSITORY_RULES_JSON: "[]"
      PCG_REPO_FILE_PARSE_MULTIPROCESS: "${PCG_REPO_FILE_PARSE_MULTIPROCESS:-false}"
      PCG_PARSE_WORKERS: "${PCG_PARSE_WORKERS:-4}"
      PCG_WORKER_MAX_TASKS: "${PCG_WORKER_MAX_TASKS:-}"
      PCG_INDEX_QUEUE_DEPTH: "${PCG_INDEX_QUEUE_DEPTH:-8}"
      PCG_COMMIT_WORKERS: "${PCG_COMMIT_WORKERS:-1}"
      INDEX_VARIABLES: "${INDEX_VARIABLES:-false}"
      PCG_MAX_CALLS_PER_FILE: "${PCG_MAX_CALLS_PER_FILE:-50}"
      PCG_DEPLOYMENT_ENVIRONMENT: local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
    volumes:
      - pcg_data:/data
      - ./:/app-src
      - ${PCG_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started

  platform-context-graph:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pcg", "serve", "start", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "${PCG_HTTP_PORT:-8080}:8080"
    environment:
      DEFAULT_DATABASE: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${PCG_NEO4J_PASSWORD:-change-me}
      PCG_CONTENT_STORE_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_POSTGRES_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_HOME: /data/.platform-context-graph
      PCG_REPOS_DIR: /data/repos
      PCG_REPO_SOURCE_MODE: filesystem
      PCG_FILESYSTEM_ROOT: /fixtures
      PCG_GIT_AUTH_METHOD: none
      PCG_REPOSITORY_RULES_JSON: "[]"
      PCG_RUNTIME_ROLE: api
      PCG_AUTO_GENERATE_API_KEY: "true"
      PCG_REPO_FILE_PARSE_MULTIPROCESS: "${PCG_REPO_FILE_PARSE_MULTIPROCESS:-false}"
      PCG_PARSE_WORKERS: "${PCG_PARSE_WORKERS:-4}"
      PCG_WORKER_MAX_TASKS: "${PCG_WORKER_MAX_TASKS:-}"
      PCG_INDEX_QUEUE_DEPTH: "${PCG_INDEX_QUEUE_DEPTH:-8}"
      PCG_COMMIT_WORKERS: "${PCG_COMMIT_WORKERS:-1}"
      INDEX_VARIABLES: "${INDEX_VARIABLES:-false}"
      PCG_MAX_CALLS_PER_FILE: "${PCG_MAX_CALLS_PER_FILE:-50}"
      PCG_DEPLOYMENT_ENVIRONMENT: local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
    volumes:
      - pcg_data:/data
      - ./:/app-src
      - ${PCG_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  repo-sync:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pcg", "internal", "repo-sync-loop"]
    healthcheck:
      disable: true
    environment:
      DEFAULT_DATABASE: neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${PCG_NEO4J_PASSWORD:-change-me}
      PCG_CONTENT_STORE_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_POSTGRES_DSN: postgresql://pcg:${PCG_POSTGRES_PASSWORD:-change-me}@postgres:5432/platform_context_graph
      PCG_HOME: /data/.platform-context-graph
      PCG_REPOS_DIR: /data/repos
      PCG_REPO_SOURCE_MODE: filesystem
      PCG_FILESYSTEM_ROOT: /fixtures
      PCG_GIT_AUTH_METHOD: none
      PCG_REPOSITORY_RULES_JSON: "[]"
      PCG_REPO_SYNC_INITIAL_DELAY_SECONDS: "${PCG_REPO_SYNC_INITIAL_DELAY_SECONDS:-30}"
      PCG_REPO_SYNC_INTERVAL_SECONDS: "${REPO_SYNC_INTERVAL_SECONDS:-900}"
      PCG_REPO_FILE_PARSE_MULTIPROCESS: "${PCG_REPO_FILE_PARSE_MULTIPROCESS:-false}"
      PCG_PARSE_WORKERS: "${PCG_PARSE_WORKERS:-4}"
      PCG_WORKER_MAX_TASKS: "${PCG_WORKER_MAX_TASKS:-}"
      PCG_INDEX_QUEUE_DEPTH: "${PCG_INDEX_QUEUE_DEPTH:-8}"
      PCG_COMMIT_WORKERS: "${PCG_COMMIT_WORKERS:-1}"
      INDEX_VARIABLES: "${INDEX_VARIABLES:-false}"
      PCG_MAX_CALLS_PER_FILE: "${PCG_MAX_CALLS_PER_FILE:-50}"
      PCG_DEPLOYMENT_ENVIRONMENT: local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
    volumes:
      - pcg_data:/data
      - ./:/app-src
      - ${PCG_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
      bootstrap-index:
        condition: service_completed_successfully

volumes:
  neo4j_data:
  postgres_data:
  pcg_data:
