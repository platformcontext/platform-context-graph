# Docker Compose override: replace Neo4j with NornicDB for local compatibility testing.
#
# Usage:
#   docker-compose -f docker-compose.yaml -f docker-compose.nornicdb.yml up --build
#
# NornicDB is a Go-based graph database with Bolt/Cypher compatibility.
# It exposes the same ports as Neo4j (7474 HTTP, 7687 Bolt), while PCG
# services must explicitly select the NornicDB graph backend and the
# "nornic" database.
#
# Image: uses the same upstream amd64 CPU image deployed to EKS via JFrog.
# Override via NORNICDB_IMAGE env var:
#   NORNICDB_IMAGE=timothyswt/nornicdb-arm64-metal-bge:latest docker-compose \
#     -f docker-compose.yaml -f docker-compose.nornicdb.yml up --build
#
# IMPORTANT: NornicDB's default database is "nornic", not "neo4j".
# PCG_GRAPH_BACKEND selects the adapter; PCG_NEO4J_DATABASE / NEO4J_DATABASE
# select the Bolt database name used by the compatibility driver.

x-pcg-nornicdb-env: &pcg-nornicdb-env
  PCG_GRAPH_BACKEND: nornicdb
  DEFAULT_DATABASE: nornic
  PCG_NEO4J_DATABASE: nornic
  NEO4J_DATABASE: nornic

services:
  # Override the neo4j service -- keep the service name so that all
  # depends_on references and bolt://neo4j:7687 URIs resolve unchanged.
  neo4j:
    image: ${NORNICDB_IMAGE:-timothyswt/nornicdb-amd64-cpu:latest}
    platform: linux/amd64
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      # Disable auth -- NornicDB accepts any credentials when this is true.
      NORNICDB_NO_AUTH: "true"
      NORNICDB_DATA_DIR: /data
      NORNICDB_HTTP_PORT: "7474"
      NORNICDB_BOLT_PORT: "7687"
      # Sync writes: prevents MERGE TOCTOU race in async engine.
      # Async writes have a visibility gap during flush where findMergeNode
      # can miss nodes that constraint checks can see, causing
      # "failed to create node in MERGE: already exists" errors.
      NORNICDB_ASYNC_WRITES_ENABLED: "false"
      # Disable features we don't need.
      NORNICDB_HEIMDALL_ENABLED: "false"
      NORNICDB_QDRANT_GRPC_ENABLED: "false"
      NORNICDB_EMBEDDING_PROVIDER: local
    volumes:
      - nornicdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # Patch graph-using PCG services so migrations, writes, and reads all target
  # the same NornicDB backend/database pair.
  db-migrate:
    environment:
      <<: *pcg-nornicdb-env

  platform-context-graph:
    environment:
      <<: *pcg-nornicdb-env

  mcp-server:
    environment:
      <<: *pcg-nornicdb-env

  bootstrap-index:
    environment:
      <<: *pcg-nornicdb-env

  ingester:
    environment:
      <<: *pcg-nornicdb-env

  resolution-engine:
    environment:
      <<: *pcg-nornicdb-env

  workflow-coordinator:
    environment:
      <<: *pcg-nornicdb-env

volumes:
  nornicdb_data:
