# Docker Compose override: replace Neo4j with NornicDB for local compatibility testing.
#
# Usage:
#   docker-compose -f docker-compose.yaml -f docker-compose.nornicdb.yml up --build
#
# NornicDB is a Go-based graph database with Bolt/Cypher compatibility.
# It exposes the same ports as Neo4j (7474 HTTP, 7687 Bolt) so PCG
# connects without configuration changes.
#
# Image selection:
#   - ARM64 (Apple Silicon): timothyswt/nornicdb-arm64-metal:latest  (default)
#   - AMD64 (x86/Linux):     timothyswt/nornicdb-amd64:latest
#
# Override the image via environment variable:
#   NORNICDB_IMAGE=timothyswt/nornicdb-amd64:latest docker-compose \
#     -f docker-compose.yaml -f docker-compose.nornicdb.yml up --build

services:
  # Override the neo4j service -- keep the service name so that all
  # depends_on references and bolt://neo4j:7687 URIs resolve unchanged.
  neo4j:
    image: ${NORNICDB_IMAGE:-timothyswt/nornicdb-arm64-metal:latest}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      # NornicDB environment configuration.
      # Pass the same auth credentials so PCG's NEO4J_USERNAME / NEO4J_PASSWORD
      # work unchanged. NornicDB accepts NEO4J_AUTH in the same user/password
      # format. If NornicDB does not enforce auth, these are harmlessly ignored.
      NEO4J_AUTH: neo4j/${PCG_NEO4J_PASSWORD:-change-me}
    volumes:
      - nornicdb_data:/data
    healthcheck:
      # NornicDB exposes an HTTP /health endpoint instead of cypher-shell.
      # Fall back to a plain TCP check on the Bolt port if /health is not
      # available in the running image version.
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/health || nc -z localhost 7687"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  # Separate volume name so NornicDB data doesn't collide with Neo4j data
  # if you switch between the two.
  nornicdb_data:
