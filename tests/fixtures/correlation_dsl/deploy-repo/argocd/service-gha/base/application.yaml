apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-gha
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/service-gha.git
    targetRevision: main
    path: deploy/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: service-gha
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
