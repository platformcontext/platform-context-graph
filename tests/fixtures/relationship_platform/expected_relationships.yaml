    target: service-edge-api
  - type: PROVISIONS_DEPENDENCY_FOR
    source: infra-runtime-modern
    target: service-edge-api
  - type: PROVISIONS_DEPENDENCY_FOR
    source: infra-runtime-modern
    target: service-worker-jobs
  - type: PROVISIONS_DEPENDENCY_FOR
    source: infra-runtime-legacy
    target: infra-modules-shared
  - type: PROVISIONS_DEPENDENCY_FOR
    source: infra-runtime-modern
    target: infra-modules-shared
  - type: DEPLOYS_FROM
    source: deployment-helm
    target: service-edge-api
  - type: DEPLOYS_FROM
    source: deployment-helm
    target: service-worker-jobs
  - type: DEPLOYS_FROM
    source: deployment-kustomize
    target: service-edge-api
  - type: DEPLOYS_FROM
