services:
  edge-api:
    build:
      context: .
    image: ghcr.io/platformcontext/service-worker-jobs:latest
    depends_on:
      service-worker-jobs:
        condition: service_started
    environment:
      PCG_MODE: local
    ports:
      - "8080:8080"

  service-worker-jobs:
    build:
      context: ../service-worker-jobs
    environment:
      PCG_MODE: worker
