apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-target
spec:
  selector:
    matchLabels:
      app: dynamic-target
  template:
    metadata:
      labels:
        app: dynamic-target
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
