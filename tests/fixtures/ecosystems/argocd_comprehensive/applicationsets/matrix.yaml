apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: matrix-example
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/myorg/config.git
              files:
                - path: envs/*/config.yaml
          - list:
              elements:
                - cluster: production
                  url: https://prod-cluster.example.com
                - cluster: staging
                  url: https://staging-cluster.example.com
  template:
    metadata:
      name: '{{path.basename}}-{{cluster}}'
    spec:
      project: platform
      source:
        repoURL: https://github.com/myorg/config.git
        path: 'envs/{{path.basename}}'
        targetRevision: main
      destination:
        server: '{{url}}'
        namespace: '{{path.basename}}'
