apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: comprehensive-cache
  namespace: production
spec:
  serviceName: comprehensive-cache
  replicas: 3
  selector:
    matchLabels:
      app: comprehensive-cache
  template:
    metadata:
      labels:
        app: comprehensive-cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
