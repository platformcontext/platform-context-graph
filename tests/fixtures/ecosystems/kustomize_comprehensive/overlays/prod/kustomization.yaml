apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base

replicas:
  - name: comprehensive-app
    count: 5

images:
  - name: myorg/comprehensive-app
    newTag: v2.0.0

configMapGenerator:
  - name: app-config
    literals:
      - ENV=production
      - DEBUG=false
