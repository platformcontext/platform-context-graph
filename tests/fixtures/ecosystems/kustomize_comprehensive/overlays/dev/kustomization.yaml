apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: comprehensive-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

configMapGenerator:
  - name: app-config
    literals:
      - ENV=development
      - DEBUG=true
