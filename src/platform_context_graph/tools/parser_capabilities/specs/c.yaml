language: c
title: C Parser
family: language
parser: CTreeSitterParser
parser_entrypoint: src/platform_context_graph/tools/languages/c.py
doc_path: docs/docs/languages/c.md
fixture_repo: tests/fixtures/ecosystems/c_comprehensive/
unit_test_file: tests/unit/parsers/test_c_parser.py
integration_test_suite: tests/integration/test_language_graph.py::TestCGraph
capabilities:
- id: functions
  name: Functions
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_functions
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: pointer-returning-functions
  name: Pointer-returning functions
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_functions
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: structs
  name: Structs
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_structs
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: unions
  name: Unions
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_unions
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: enums
  name: Enums
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_enums
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: typedefs
  name: Typedefs
  status: unsupported
  extracted_bucket: typedefs
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_typedefs_do_not_emit_dedicated_entities
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_typedef_nodes_not_created
  rationale: Typedef syntax is tolerated during parsing, but the normalized parser output
    does not emit dedicated typedef entities and the graph layer has no Typedef node
    surface.
- id: includes
  name: Includes
  status: supported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_includes
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: function-calls
  name: Function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_function_calls
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: variables-initialized-declarations
  name: Variables (initialized declarations)
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_initialized_variables
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
- id: macros-define
  name: Macros (`#define`)
  status: supported
  extracted_bucket: macros
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Macro
  unit_test: tests/unit/parsers/test_c_parser.py::test_parse_macros
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
known_limitations:
- Function pointer declarations are not modeled as callable entities
- Preprocessor macros with complex expansions are captured by name only
- Variadic functions do not expose their variadic argument types
