language: kotlin
title: Kotlin Parser
family: language
parser: KotlinTreeSitterParser
parser_entrypoint: src/platform_context_graph/tools/languages/kotlin.py
doc_path: docs/docs/languages/kotlin.md
fixture_repo: tests/fixtures/ecosystems/kotlin_comprehensive/
unit_test_file: tests/unit/parsers/test_kotlin_parser.py
integration_test_suite: tests/integration/test_language_graph.py::TestKotlinGraph
capabilities:
- id: functions
  name: Functions
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_simple_declarations
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: classes
  name: Classes
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_simple_declarations
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: objects-object
  name: Objects (`object`)
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: companion-objects
  name: Companion objects
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: imports
  name: Imports
  status: supported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_pre_scan_kotlin_keeps_public_import_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: function-calls
  name: Function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: property-declarations
  name: Property declarations
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: class-context-on-functions
  name: Class context on functions
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - class_context
  graph_surface:
    kind: property
    target: Function.class_context
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_runtime_surface
- id: secondary-constructors
  name: Secondary constructors
  status: partial
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_kotlin_parser.py::test_parse_kotlin_extended_surface
  integration_test: tests/integration/test_language_graph.py::TestKotlinGraph::test_class_nodes
  rationale: Secondary constructor syntax is parsed as part of class structure, but
    constructor-specific graph nodes or relationships are not persisted yet.
known_limitations:
- Kotlin interfaces are not separately bucketed from classes
- Extension functions are captured as regular functions without extension receiver
  tracking
- Coroutine suspend functions do not carry a suspend flag in the output
