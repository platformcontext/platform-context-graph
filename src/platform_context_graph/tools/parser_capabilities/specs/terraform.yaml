  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terraform_variables
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_variables_created
- id: output-blocks
  name: Output blocks
  status: supported
  extracted_bucket: terraform_outputs
  required_fields:
  - name
  - line_number
