language: terraform
title: Terraform Parser
family: iac
parser: HCLTerraformParser
parser_entrypoint: src/platform_context_graph/tools/languages/hcl_terraform.py
doc_path: docs/docs/languages/terraform.md
fixture_repo: tests/fixtures/ecosystems/terraform_comprehensive/
unit_test_file: tests/unit/parsers/test_hcl_terraform_parser.py
integration_test_suite: tests/integration/test_iac_graph.py::TestTerraformGraph
capabilities:
- id: resource-blocks
  name: Resource blocks
  status: supported
  extracted_bucket: terraform_resources
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: node
    target: TerraformResource
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terraform_resources
