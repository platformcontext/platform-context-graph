language: kubernetes
title: Kubernetes Parser
family: iac
parser: InfraYAMLParser
parser_entrypoint: src/platform_context_graph/tools/languages/yaml_infra.py
doc_path: docs/docs/languages/kubernetes.md
fixture_repo: tests/fixtures/ecosystems/kubernetes_comprehensive/
unit_test_file: tests/unit/parsers/test_yaml_infra_parser.py
integration_test_suite: tests/integration/test_iac_graph.py::TestKubernetesGraph
capabilities:
- id: kubernetes-resources-any-apiversion-kind
  name: Kubernetes resources (any `apiVersion`/`kind`)
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  - kind
  - version
  - resources
  graph_surface:
    kind: node
    target: K8sResource
  unit_test: tests/unit/parsers/test_yaml_infra_parser.py::TestInfraYAMLParser::test_no_k8s_standalone_resources_without_api_version
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: api-version
