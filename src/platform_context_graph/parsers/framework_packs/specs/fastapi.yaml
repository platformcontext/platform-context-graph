framework: fastapi
title: FastAPI Base Pack
strategy: python_web_routes
compute_order: 50
surface_order: 50
languages:
  - python
config:
  import_full_names:
    - fastapi.FastAPI
    - fastapi.APIRouter
  constructor_names:
    - FastAPI
    - APIRouter
  route_decorator_map:
    get:
      - GET
    post:
      - POST
    put:
      - PUT
    patch:
      - PATCH
    delete:
      - DELETE
    head:
      - HEAD
    options:
      - OPTIONS
  prefix_keyword_names:
    - prefix
  require_known_server_symbol: true
