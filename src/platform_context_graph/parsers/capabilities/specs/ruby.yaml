language: ruby
title: Ruby Parser
family: language
parser: RubyTreeSitterParser
parser_entrypoint: src/platform_context_graph/tools/languages/ruby.py
doc_path: docs/docs/languages/ruby.md
fixture_repo: tests/fixtures/ecosystems/ruby_comprehensive/
unit_test_file: tests/unit/parsers/test_ruby_parser.py
integration_test_suite: tests/integration/test_language_graph.py::TestRubyGraph
capabilities:
- id: methods-def
  name: Methods (`def`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_definitions
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: classes
  name: Classes
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_definitions
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: modules
  name: Modules
  status: supported
  extracted_bucket: modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Module
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_definitions
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: require-load-imports
  name: Require/load imports
  status: unsupported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_require_relative_stays_out_of_imports
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_require_relative_imports_not_persisted
  rationale: Ruby `require` and `require_relative` statements stay in the pre-scan import
    surface, but the normalized parser result does not emit persisted IMPORTS edges for
    the comprehensive fixture set.
- id: method-calls
  name: Method calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: instance-variable-assignments
  name: Instance variable assignments
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: local-variable-assignments
  name: Local variable assignments
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: module-inclusions-include-extend
  name: Module inclusions (`include`/`extend`)
  status: supported
  extracted_bucket: module_inclusions
  required_fields:
  - class
  - module
  - line_number
  graph_surface:
    kind: relationship
    target: INCLUDES
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: parent-context-class-module
  name: Parent context (class/module)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - class_context
  graph_surface:
    kind: property
    target: Function.class_context
  unit_test: tests/unit/parsers/test_ruby_parser.py::test_parse_ruby_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
known_limitations:
- Singleton methods (defined on specific objects) are not separated from instance
  methods
- '`method_missing` based dynamic dispatch is not tracked'
- DSL-style method definitions (e.g., ActiveRecord scopes) are captured as regular
  calls only
