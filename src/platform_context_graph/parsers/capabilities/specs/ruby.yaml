  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: go/internal/parser/engine_ruby_semantics_test.go::TestDefaultEngineParsePathRubyEmitsRequireAndLoadImports
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: method-calls
  name: Method calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: go/internal/parser/engine_ruby_semantics_test.go::TestDefaultEngineParsePathRubyCapturesGenericDslAndMethodCalls
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: instance-variable-assignments
  name: Instance variable assignments
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: go/internal/parser/engine_ruby_semantics_test.go::TestDefaultEngineParsePathRubyCapturesLocalAndInstanceAssignments
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: local-variable-assignments
  name: Local variable assignments
  status: supported
