  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: go/internal/parser/engine_ruby_semantics_test.go::TestDefaultEngineParsePathRubyCapturesLocalAndInstanceAssignments
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: module-inclusions-include-extend
  name: Module inclusions (`include`/`extend`)
  status: supported
  extracted_bucket: module_inclusions
  required_fields:
  - class
  - module
  - line_number
  graph_surface:
    kind: relationship
    target: INCLUDES
  unit_test: go/internal/parser/engine_long_tail_test.go::TestDefaultEngineParsePathRubyFixtures
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: parent-context-class-module
  name: Parent context (class/module)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - class_context
  graph_surface:
    kind: property
    target: Function.class_context
  unit_test: go/internal/parser/engine_ruby_semantics_test.go::TestDefaultEngineParsePathRubyEmitsFunctionArgsAndContext
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
known_limitations:
- Singleton methods (defined on specific objects) are not separated from instance
  methods
- '`method_missing` based dynamic dispatch is not tracked'
- DSL-style method definitions (e.g., ActiveRecord scopes) are captured as regular
  calls only
