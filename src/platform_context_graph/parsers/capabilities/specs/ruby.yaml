language: ruby
title: Ruby Parser
family: language
parser: DefaultEngine (ruby)
parser_entrypoint: go/internal/parser/ruby_language.go
doc_path: docs/docs/languages/ruby.md
fixture_repo: tests/fixtures/ecosystems/ruby_comprehensive/
unit_test_file: go/internal/parser/engine_ruby_semantics_test.go
integration_test_suite: tests/integration/test_language_graph.py::TestRubyGraph
capabilities:
- id: methods-def
  name: Methods (`def`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: go/internal/parser/engine_long_tail_test.go::TestDefaultEngineParsePathRubyFixtures
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: classes
  name: Classes
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: go/internal/parser/engine_long_tail_test.go::TestDefaultEngineParsePathRubyFixtures
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: modules
  name: Modules
  status: supported
  extracted_bucket: modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Module
  unit_test: go/internal/parser/engine_long_tail_test.go::TestDefaultEngineParsePathRubyFixtures
  integration_test: tests/integration/test_language_graph.py::TestRubyGraph::test_runtime_surface
- id: require-load-imports
  name: Require/load imports
  status: supported
  extracted_bucket: imports
  required_fields:
