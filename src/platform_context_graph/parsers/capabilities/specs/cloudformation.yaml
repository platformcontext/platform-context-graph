language: cloudformation
title: CloudFormation Parser
family: iac
parser: DefaultEngine (yaml)
parser_entrypoint: go/internal/parser/yaml_language.go
doc_path: docs/docs/languages/cloudformation.md
fixture_repo: tests/fixtures/ecosystems/cloudformation_comprehensive/
unit_test_file: go/internal/parser/engine_yaml_semantics_test.go
integration_test_suite: tests/integration/test_iac_graph.py::TestCloudFormationGraph
capabilities:
- id: resources
  name: Resources
  status: supported
  extracted_bucket: cloudformation_resources
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: node
    target: CloudFormationResource
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLCloudFormation
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
