language: cloudformation
title: CloudFormation Parser
family: iac
parser: InfraYAMLParser
parser_entrypoint: src/platform_context_graph/parsers/languages/yaml_infra.py
doc_path: docs/docs/languages/cloudformation.md
fixture_repo: tests/fixtures/ecosystems/cloudformation_comprehensive/
unit_test_file: tests/unit/parsers/test_cloudformation_parser.py
integration_test_suite: tests/integration/test_iac_graph.py::TestCloudFormationGraph
capabilities:
- id: resources
  name: Resources
  status: supported
  extracted_bucket: cloudformation_resources
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: node
    target: CloudFormationResource
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationDetection::test_detect_by_aws_resource_type
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
- id: parameters
  name: Parameters
  status: supported
  extracted_bucket: cloudformation_parameters
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: CloudFormationParameter
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationParameters::test_parse_simple_parameters
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_parameters_indexed
- id: outputs
  name: Outputs
  status: supported
  extracted_bucket: cloudformation_outputs
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: CloudFormationOutput
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationOutputs::test_parse_simple_outputs
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_outputs_indexed
- id: dependson
  name: DependsOn
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  - depends_on
  graph_surface:
    kind: property
    target: depends_on property
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationParameters::test_parse_parameter_with_allowed_values
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
- id: conditions
  name: Conditions
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  - condition
  graph_surface:
    kind: property
    target: condition property
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationParameters::test_parse_parameter_with_allowed_values
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
- id: export-names
  name: Export names
  status: supported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  - export_name
  graph_surface:
    kind: property
    target: export_name property
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationOutputs::test_parse_output_with_export
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
- id: allowedvalues
  name: AllowedValues
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  - allowed_values
  graph_surface:
    kind: property
    target: allowed_values property
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationParameters::test_parse_parameter_with_allowed_values
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
- id: json-templates
  name: JSON templates
  status: partial
  extracted_bucket: file_format
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_cloudformation_parser.py::TestCloudFormationDetection::test_detect_by_template_version
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
  rationale: JSON-formatted templates are detected at parse time, but the comprehensive
    fixture and end-to-end indexing coverage are still YAML-first.
known_limitations:
- Intrinsic functions (!Ref, !Sub, !GetAtt) stored as string values, not resolved
- Nested stack references not linked across files
- Condition evaluation not performed
