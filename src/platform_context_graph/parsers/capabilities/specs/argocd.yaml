language: argocd
title: ArgoCD Parser
family: iac
parser: DefaultEngine (yaml)
parser_entrypoint: go/internal/parser/yaml_language.go
doc_path: docs/docs/languages/argocd.md
fixture_repo: tests/fixtures/ecosystems/argocd_comprehensive/
unit_test_file: go/internal/parser/engine_yaml_semantics_test.go
integration_test_suite: tests/integration/test_iac_graph.py::TestArgoCDGraph
capabilities:
- id: argocd-applications-application
  name: ArgoCD Applications (`Application`)
  status: supported
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: ArgoCDApplication
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
- id: application-source-repo-url
  name: Application source repo URL
  status: supported
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  - source_repo
  graph_surface:
    kind: property
    target: Application.source_repo
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
- id: application-source-path
  name: Application source path
  status: supported
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  - source_path
  graph_surface:
    kind: property
    target: Application.source_path
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
- id: destination-namespace
  name: Destination namespace
  status: supported
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  - namespace
  - dest_namespace
  graph_surface:
    kind: property
    target: Application.dest_namespace
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
- id: destination-server
  name: Destination server
  status: supported
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  - dest_server
  graph_surface:
    kind: property
    target: Application.dest_server
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
- id: argocd-applicationsets-applicationset
  name: ArgoCD ApplicationSets (`ApplicationSet`)
  status: supported
  extracted_bucket: argocd_applicationsets
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: ArgoCDApplicationSet
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplicationSetNestedSources
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applicationsets_indexed
- id: applicationset-generator-source-repos-paths
  name: ApplicationSet generator source repos/paths
  status: supported
  extracted_bucket: argocd_applicationsets
  required_fields:
  - name
  - line_number
  - source_repos
  - source_paths
  - source_roots
  - generators
  graph_surface:
    kind: property
    target: ArgoCDApplicationSet.generator_sources
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplicationSetNestedSources
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applicationsets_indexed
- id: sync-policy
  name: Sync policy
  status: partial
  extracted_bucket: argocd_applications
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLArgoCDApplication
  integration_test: tests/integration/test_iac_graph.py::TestArgoCDGraph::test_argocd_applications_indexed
  rationale: The native YAML parser does not currently normalize `syncPolicy`
    into the Argo CD payload.
known_limitations:
- Helm-specific source parameters (`helm.valueFiles`, `helm.parameters`) are not extracted
  as structured nodes
- ApplicationSet matrix generators are traversed for git sources, but merge and plugin
  generator variants are not normalized yet
- '`ignoreDifferences` and custom health checks are not modeled'
