  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: go/internal/parser/engine_systems_test.go::TestDefaultEngineParsePathC
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_runtime_surface
