language: c
title: C Parser
family: language
parser: DefaultEngine (c)
parser_entrypoint: go/internal/parser/c_language.go
doc_path: docs/docs/languages/c.md
fixture_repo: tests/fixtures/ecosystems/c_comprehensive/
unit_test_file: go/internal/parser/engine_systems_test.go
integration_test_suite: tests/integration/test_language_graph.py::TestCGraph
capabilities:
