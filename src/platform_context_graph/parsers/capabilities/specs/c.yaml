  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_systems_test.go::TestDefaultEngineParsePathCTypedefAliasEmitsDedicatedEntities
  integration_test: tests/integration/test_language_graph.py::TestCGraph::test_typedef_nodes_not_created
