  integration_test: tests/integration/test_language_graph.py::TestPerlGraph::test_runtime_surface
- id: ambiguous-function-calls
  name: Ambiguous function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_perl_parser.py::test_parse_function_calls
  integration_test: tests/integration/test_language_graph.py::TestPerlGraph::test_runtime_surface
- id: plain-function-calls
  name: Plain function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_perl_parser.py::test_parse_function_calls
  integration_test: tests/integration/test_language_graph.py::TestPerlGraph::test_runtime_surface
- id: scalar-variables-my-x
