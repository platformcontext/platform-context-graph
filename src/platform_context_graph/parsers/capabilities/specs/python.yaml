language: python
title: Python Parser
family: language
parser: DefaultEngine (python)
parser_entrypoint: go/internal/parser/python_language.go
doc_path: docs/docs/languages/python.md
fixture_repo: tests/fixtures/ecosystems/python_comprehensive/
unit_test_file: go/internal/parser/engine_python_semantics_test.go
integration_test_suite: tests/integration/test_language_graph.py::TestPythonGraph
support_maturity:
  grammar_routing: supported
  normalization: supported
  framework_packs: supported
  framework_pack_names:
    - fastapi-base
    - flask-base
  query_surfacing: supported
  real_repo_validation: supported
  real_repo_examples:
    - recos-ranker-service (clean end-to-end validation with FastAPI framework evidence)
    - lambda-python-s3-proxy (clean end-to-end validation with Flask framework evidence)
    - lambda-python-lb-s3-files (discovery-aware parser validation with Flask route evidence)
  end_to_end_indexing: supported
  notes:
    - recos-ranker-service completed a clean local end-to-end indexing run (run 1cfe41a63cb2bd4a)
    - lambda-python-s3-proxy completed a clean local end-to-end indexing run (run 6a792e3bb05f5c69)
    - repo context, repo summary, and repo story all surfaced FastAPI or Flask framework evidence through the default FalkorDB backend
capabilities:
- id: functions
  name: Functions
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_entity_surface
- id: classes
  name: Classes
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Class
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_entity_surface
- id: imports
  name: Imports
  status: supported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_import_edges_created
- id: function-calls
  name: Function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_function_call_edges_created
- id: variables
  name: Variables
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_variable_nodes_created
- id: decorators
  name: Decorators
  status: unsupported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - decorators
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_python_semantics_test.go::TestDefaultEngineParsePathPythonDecoratedFunctionsEmitDecoratorMetadata
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_decorator_metadata_not_persisted
  rationale: The Go parser now emits decorator metadata, but the graph surface does
    not yet persist decorators as first-class queryable properties.
- id: async-functions
  name: Async functions
  status: unsupported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - async
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_python_semantics_test.go::TestDefaultEngineParsePathPythonAsyncFunctionsEmitAsyncFlag
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_async_flag_not_persisted
  rationale: The Go parser now emits the async flag, but the graph surface does not
    yet retain it as a queryable property.
- id: inheritance
  name: Inheritance
  status: supported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  - bases
  graph_surface:
    kind: relationship
    target: INHERITS
  unit_test: go/internal/parser/engine_test.go::TestDefaultEngineParsePathPython
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_inheritance_edges
- id: type-annotations
  name: Type annotations
  status: unsupported
  extracted_bucket: type_annotations
  required_fields:
  - name
  - line_number
  - type
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_python_semantics_test.go::TestDefaultEngineParsePathPythonEmitsTypeAnnotationsBucket
  integration_test: tests/integration/test_language_graph.py::TestPythonGraph::test_type_annotation_nodes_not_created
  rationale: The Go parser emits a dedicated `type_annotations` bucket, but the graph
    surface does not yet materialize TypeAnnotation nodes end to end.
known_limitations:
- Lambda functions detected as unnamed functions
- Comprehension-internal functions not always tracked
- Metaclass relationships not captured
