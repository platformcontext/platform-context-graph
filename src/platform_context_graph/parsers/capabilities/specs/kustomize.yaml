language: kustomize
title: Kustomize Parser
family: iac
parser: DefaultEngine (yaml)
parser_entrypoint: go/internal/parser/yaml_language.go
doc_path: docs/docs/languages/kustomize.md
fixture_repo: tests/fixtures/ecosystems/kustomize_comprehensive/
unit_test_file: go/internal/parser/engine_yaml_semantics_test.go
integration_test_suite: tests/integration/test_iac_graph.py::TestKustomizeGraph
capabilities:
- id: kustomization-overlays-kustomization-yaml
  name: Kustomization overlays (`kustomization.yaml`)
  status: supported
  extracted_bucket: kustomize_overlays
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: KustomizeOverlay
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLKustomizeAndHelm
  integration_test: tests/integration/test_iac_graph.py::TestKustomizeGraph::test_kustomize_overlays_indexed
- id: namespace
  name: Namespace
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  - namespace
  graph_surface:
    kind: property
    target: Overlay.property
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLKustomizeAndHelm
  integration_test: tests/integration/test_iac_graph.py::TestKustomizeGraph::test_kustomize_overlays_indexed
- id: resources-list
  name: Resources list
  status: supported
  extracted_bucket: kustomize_overlays
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: property
    target: Overlay.resources
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLKustomizeAndHelm
  integration_test: tests/integration/test_iac_graph.py::TestKustomizeGraph::test_kustomize_k8s_resources
- id: patches-list
  name: Patches list
  status: supported
  extracted_bucket: kustomize_overlays
  required_fields:
  - name
  - line_number
  - patches
  graph_surface:
    kind: property
    target: Overlay.patches
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLKustomizeAndHelm
  integration_test: tests/integration/test_iac_graph.py::TestKustomizeGraph::test_kustomize_overlays_indexed
- id: base-references
  name: Base references
  status: partial
  extracted_bucket: kustomize_overlays
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_yaml_semantics_test.go::TestDefaultEngineParsePathYAMLKustomizeAndHelm
  integration_test: tests/integration/test_iac_graph.py::TestKustomizeGraph::test_kustomize_overlays_indexed
  rationale: Base references remain part of the normalized `resources` list instead
    of a separate `bases` field in the native YAML payload.
known_limitations:
- Strategic merge patches are not parsed for the target resource they modify
- '`components` and `configurations` sections are not extracted'
- Inline patch bodies within `kustomization.yaml` are not traversed for field-level
  details
