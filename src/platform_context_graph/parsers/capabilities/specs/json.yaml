  - line_number
  - source
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_json_parser.py::TestJSONConfigParser::test_parse_package_json_dependencies_and_scripts
  integration_test: tests/integration/test_json_graph.py::TestJSONGraph::test_package_json_scripts_indexed
- id: composer-json-dependencies
  name: composer.json require sections
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  - value
  - section
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_json_parser.py::TestJSONConfigParser::test_parse_composer_json_require_sections
