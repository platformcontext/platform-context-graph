  status: supported
  extracted_bucket: cloudformation_resources
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: CloudFormationResource
  unit_test: tests/unit/parsers/test_json_parser.py::TestJSONConfigParser::test_parse_cloudformation_json_template
  integration_test: tests/integration/test_iac_graph.py::TestCloudFormationGraph::test_cloudformation_resources_indexed
known_limitations:
- Generic JSON files emit metadata only and do not expand arbitrary nested objects into graph nodes
- Lockfiles and minified JSON assets are intentionally kept metadata-only to avoid graph noise
