  - line_number
  - value
  - config_kind
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_json_parser.py::TestJSONConfigParser::test_parse_tsconfig_references_and_paths
  integration_test: tests/integration/test_json_graph.py::TestJSONGraph::test_tsconfig_json_metadata_indexed
- id: generic-json-metadata-only
  name: Generic JSON metadata only
  status: partial
  extracted_bucket: json_metadata
  required_fields:
  - top_level_keys
  graph_surface:
    kind: property
    target: File
  unit_test: tests/unit/parsers/test_json_parser.py::TestJSONConfigParser::test_skip_non_config_json
  integration_test: tests/integration/test_json_graph.py::TestJSONGraph::test_tsconfig_json_metadata_indexed
