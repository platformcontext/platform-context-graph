language: terraform
title: Terraform Parser
family: iac
parser: DefaultEngine (hcl)
parser_entrypoint: go/internal/parser/hcl_language.go
doc_path: docs/docs/languages/terraform.md
fixture_repo: tests/fixtures/ecosystems/terraform_comprehensive/
unit_test_file: go/internal/parser/engine_infra_test.go
integration_test_suite: tests/integration/test_iac_graph.py::TestTerraformGraph
capabilities:
- id: resource-blocks
  name: Resource blocks
  status: supported
  extracted_bucket: terraform_resources
  required_fields:
  - name
  - line_number
  - resources
  graph_surface:
    kind: node
    target: TerraformResource
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_resources_created
- id: variable-blocks
  name: Variable blocks
  status: supported
  extracted_bucket: terraform_variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerraformVariable
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_variables_created
- id: output-blocks
  name: Output blocks
  status: supported
  extracted_bucket: terraform_outputs
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerraformOutput
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_outputs_created
- id: module-blocks
  name: Module blocks
  status: supported
  extracted_bucket: terraform_modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerraformModule
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_modules_with_source
- id: data-source-blocks
  name: Data source blocks
  status: supported
  extracted_bucket: terraform_data_sources
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerraformDataSource
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_data_sources
- id: terraform-block-metadata
  name: '`terraform {}` block metadata'
  status: partial
  extracted_bucket: terraform-block-metadata
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_resources_created
  rationale: The native HCL parser reads required provider metadata and provider blocks,
    but it does not materialize a standalone `terraform {}` block node.
- id: provider-blocks
  name: Provider blocks
  status: supported
  extracted_bucket: terraform_providers
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerraformProvider
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_providers_created
- id: locals-blocks
  name: Locals blocks
  status: supported
  extracted_bucket: terraform_locals
  required_fields:
  - name
  - line_number
  - value
  graph_surface:
    kind: node
    target: TerraformLocal
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathHCLTerraform
  integration_test: tests/integration/test_iac_graph.py::TestTerraformGraph::test_terraform_locals_created
known_limitations:
- '`count` and `for_each` meta-arguments are not expanded to model multiple resource
  instances'
- '`dynamic` blocks within resources are not traversed for nested attribute extraction'
- Cross-file variable references (`var.name`, `module.name.output`) are not resolved
  at parse time
