language: kubernetes
title: Kubernetes Parser
family: iac
parser: DefaultEngine (yaml)
parser_entrypoint: go/internal/parser/yaml_language.go
doc_path: docs/docs/languages/kubernetes.md
fixture_repo: tests/fixtures/ecosystems/kubernetes_comprehensive/
unit_test_file: go/internal/parser/engine_infra_test.go
integration_test_suite: tests/integration/test_iac_graph.py::TestKubernetesGraph
capabilities:
- id: kubernetes-resources-any-apiversion-kind
  name: Kubernetes resources (any `apiVersion`/`kind`)
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  - kind
  - api_version
  graph_surface:
    kind: node
    target: K8sResource
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: api-version
  name: API version
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  - api_version
  graph_surface:
    kind: property
    target: K8sResource.api_version
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: kind
  name: Kind
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  - kind
  graph_surface:
    kind: property
    target: K8sResource.kind
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: name-metadata-name
  name: Name (`metadata.name`)
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: property
    target: K8sResource.name
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: namespace-metadata-namespace
  name: Namespace (`metadata.namespace`)
  status: supported
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  - namespace
  graph_surface:
    kind: property
    target: K8sResource.namespace
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
- id: labels
  name: Labels
  status: partial
  extracted_bucket: k8s_resources
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
  rationale: The native YAML parser does not yet normalize `metadata.labels`
    onto the generic Kubernetes payload.
- id: multi-document-yaml-support
  name: Multi-document YAML support
  status: supported
  extracted_bucket: multi-document-yaml-support
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: multi-document-yaml-support
  unit_test: go/internal/parser/engine_infra_test.go::TestDefaultEngineParsePathYAMLKubernetes
  integration_test: tests/integration/test_iac_graph.py::TestKubernetesGraph::test_all_resource_kinds
known_limitations:
- Container image references within Pod specs are not extracted as separate nodes
- '`selector` and `matchLabels` relationships between resources are not resolved'
- Custom Resource Definitions (CRDs) are parsed as generic K8s resources without schema
  awareness
