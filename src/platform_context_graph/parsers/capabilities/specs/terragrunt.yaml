language: terragrunt
title: Terragrunt Parser
family: iac
parser: HCLTerraformParser
parser_entrypoint: src/platform_context_graph/tools/languages/hcl_terraform.py
doc_path: docs/docs/languages/terragrunt.md
fixture_repo: tests/fixtures/ecosystems/terragrunt_comprehensive/
unit_test_file: tests/unit/parsers/test_hcl_terraform_parser.py
integration_test_suite: tests/integration/test_iac_graph.py::TestTerragruntGraph
capabilities:
- id: terragrunt-config-blocks-include-locals-inputs
  name: Terragrunt config blocks (`include`, `locals`, `inputs`)
  status: supported
  extracted_bucket: terragrunt_configs
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: TerragruntConfig
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terragrunt_config
  integration_test: tests/integration/test_iac_graph.py::TestTerragruntGraph::test_terragrunt_configs_created
- id: include-block-labels
  name: Include block labels
  status: supported
  extracted_bucket: terragrunt_configs
  required_fields:
  - name
  - line_number
  - includes
  graph_surface:
    kind: property
    target: TerragruntConfig.includes
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terragrunt_config
  integration_test: tests/integration/test_iac_graph.py::TestTerragruntGraph::test_terragrunt_configs_created
- id: locals-block
  name: Locals block
  status: partial
  extracted_bucket: terragrunt_configs
  required_fields:
  - name
  - line_number
  - locals
  graph_surface:
    kind: property
    target: TerragruntConfig.locals
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terragrunt_config
  integration_test: tests/integration/test_iac_graph.py::TestTerragruntGraph::test_terragrunt_configs_created
  rationale: Locals are preserved on the Terragrunt config payload, but they are not
    expanded into independently queryable graph entities.
- id: inputs-block
  name: Inputs block
  status: partial
  extracted_bucket: terragrunt_configs
  required_fields:
  - name
  - line_number
  - inputs
  graph_surface:
    kind: property
    target: TerragruntConfig.inputs
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terragrunt_config
  integration_test: tests/integration/test_iac_graph.py::TestTerragruntGraph::test_terragrunt_configs_created
  rationale: Inputs are stored on the Terragrunt config node, but they are not normalized
    into separate variable-like graph nodes today.
- id: source-attribute-in-terraform-block
  name: Source attribute in `terraform` block
  status: supported
  extracted_bucket: source-attribute-in-terraform-block
  required_fields:
  - terraform_source
  graph_surface:
    kind: property
    target: TerragruntConfig.source
  unit_test: tests/unit/parsers/test_hcl_terraform_parser.py::TestHCLTerraformParser::test_parse_terragrunt_config
  integration_test: tests/integration/test_iac_graph.py::TestTerragruntGraph::test_terragrunt_has_terraform_source
known_limitations:
- Dependency blocks and their `outputs` references are not modeled as graph edges
- '`read_terragrunt_config()` calls are not statically resolved'
- HCL function calls within `locals` are not evaluated; values are captured as raw
  text
