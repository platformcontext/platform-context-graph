- id: jsdoc-comments
  name: JSDoc comments
  status: partial
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - docstring
  graph_surface:
    kind: property
    target: Function.docstring
  unit_test: tests/unit/parsers/test_javascript_parser.py::test_parse_javascript_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestJavaScriptGraph::test_jsdoc_metadata_persisted
  rationale: The parser still leaves JavaScript `docstring` fields empty, but indexed
    graph nodes now surface docstrings via content enrichment during ingest.
- id: method-kind-get-set-async
  name: Method kind (get/set/async)
  status: partial
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  - type
  graph_surface:
    kind: property
    target: Function.type
  unit_test: tests/unit/parsers/test_javascript_parser.py::test_parse_javascript_runtime_surface
  integration_test: tests/integration/test_language_graph.py::TestJavaScriptGraph::test_getter_metadata_persisted
  rationale: Getter methods are emitted with `type='getter'`, but setter and async
    metadata are not captured consistently enough to claim full support.
known_limitations:
- Computed property names in classes are not resolved to static names
- Dynamic `require()` calls with non-literal paths are not tracked
- Generator functions are captured as regular functions without generator flag
