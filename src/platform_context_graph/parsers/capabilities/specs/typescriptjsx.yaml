  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_typescriptjsx_parser.py::test_parse_tsx_imports_calls_variables_and_type_aliases
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptJSXGraph::test_type_alias_nodes_not_created
  rationale: TSX files inherit TypeScript type-alias extraction, but those alias definitions
    are not yet persisted into graph nodes.
- id: jsx-component-usage
  name: JSX component usage
  status: partial
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_typescriptjsx_parser.py::test_parse_tsx_components_and_interfaces
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptJSXGraph::test_call_edges_created
  rationale: JSX tag usage is approximated through call-like capture paths, but there
    is no dedicated component-reference model or TSX-specific query surface.
known_limitations:
- JSX element tag names are not modeled as distinct component reference nodes
- Fragment shorthand (`<>...</>`) is not separately tracked
- TSX-specific type narrowing patterns (e.g., `as ComponentType`) are not captured
