language: haskell
title: Haskell Parser
family: language
parser: HaskellTreeSitterParser
parser_entrypoint: src/platform_context_graph/tools/languages/haskell.py
doc_path: docs/docs/languages/haskell.md
fixture_repo: tests/fixtures/ecosystems/haskell_comprehensive/
unit_test_file: tests/unit/parsers/test_haskell_parser.py
integration_test_suite: tests/integration/test_language_graph.py::TestHaskellGraph
capabilities:
- id: function-declarations
  name: Function declarations
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_haskell_parser.py::test_parse_functions
  integration_test: tests/integration/test_language_graph.py::TestHaskellGraph::test_runtime_surface
- id: initializer-declarations
