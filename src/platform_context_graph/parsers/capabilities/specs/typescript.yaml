- id: type-aliases
  name: Type aliases
  status: partial
  extracted_bucket: type_aliases
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_javascript_semantics_test.go::TestDefaultEngineParsePathTypeScriptDecoratorAndGenericParity
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_function_nodes_created
  rationale: Type aliases are extracted into a dedicated parse bucket, but the persistence
    layer does not currently materialize TypeAlias graph nodes.
- id: decorators
  name: Decorators
  status: unsupported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_javascript_semantics_test.go::TestDefaultEngineParsePathTypeScriptDecoratorAndGenericParity
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_decorator_metadata_not_persisted
  rationale: The Go parser now emits decorator metadata, but the graph surface still
    does not persist decorators as first-class queryable properties.
- id: generics
  name: Generics
  status: partial
  extracted_bucket: type_parameters
  required_fields:
  - name
  - line_number
  - type_parameters
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_javascript_semantics_test.go::TestDefaultEngineParsePathTypeScriptDecoratorAndGenericParity
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_function_nodes_created
  rationale: The Go parser emits type parameter metadata, but the graph surface does
    not yet promote generic information into a dedicated query model.
known_limitations:
- Type aliases are parsed (`type_aliases` key) but not persisted to the graph — no
  persistence mapping exists
- Mapped types and conditional types not fully captured
- Namespace declarations may be incomplete
- Declaration merging not tracked
