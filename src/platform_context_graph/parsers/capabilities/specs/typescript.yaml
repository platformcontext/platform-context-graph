  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_imports
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_runtime_surface
- id: function-calls
  name: Function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_function_calls
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_runtime_surface
- id: variables
  name: Variables
  status: supported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Variable
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_variables
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_runtime_surface
- id: enums
  name: Enums
  status: supported
  extracted_bucket: enums
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Enum
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_enums
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_runtime_surface
- id: type-aliases
  name: Type aliases
  status: partial
  extracted_bucket: type_aliases
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_type_aliases
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_function_nodes_created
  rationale: Type aliases are extracted into a dedicated parse bucket, but the persistence
    layer does not currently materialize TypeAlias graph nodes.
- id: decorators
  name: Decorators
  status: unsupported
  extracted_bucket: classes
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_decorators_do_not_emit_metadata
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_decorator_metadata_not_persisted
  rationale: Decorator syntax is accepted by the parser, but decorator metadata is not
    emitted into the normalized parse result or persisted to graph properties.
- id: generics
  name: Generics
  status: partial
  extracted_bucket: type_parameters
  required_fields:
  - name
  - line_number
  - type_parameters
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_typescript_parser.py::test_parse_generics
  integration_test: tests/integration/test_language_graph.py::TestTypeScriptGraph::test_function_nodes_created
  rationale: Generic syntax is tolerated in parsed declarations, but type parameter
    metadata is not promoted into the normalized graph model.
known_limitations:
- Type aliases are parsed (`type_aliases` key) but not persisted to the graph — no
  persistence mapping exists
- Mapped types and conditional types not fully captured
- Namespace declarations may be incomplete
- Declaration merging not tracked
