language: elixir
title: Elixir Parser
family: language
parser: ElixirTreeSitterParser
parser_entrypoint: src/platform_context_graph/tools/languages/elixir.py
doc_path: docs/docs/languages/elixir.md
fixture_repo: tests/fixtures/ecosystems/elixir_comprehensive/
unit_test_file: tests/unit/parsers/test_elixir_parser.py
integration_test_suite: tests/integration/test_language_graph.py::TestElixirGraph
capabilities:
- id: functions-def-defp
  name: Functions (`def`/`defp`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_functions
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: macros-defmacro-defmacrop
  name: Macros (`defmacro`/`defmacrop`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_functions
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: guards-defguard-defguardp
  name: Guards (`defguard`/`defguardp`)
  status: unsupported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_guards_and_delegates
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_guard_definitions_not_persisted_as_functions
  rationale: Guard definitions are not emitted into the normalized `functions` bucket and
    do not persist as Function nodes; today they only surface indirectly through call-like
    captures inside guard expressions.
- id: delegated-functions-defdelegate
  name: Delegated functions (`defdelegate`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_guards_and_delegates
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: modules-defmodule
  name: Modules (`defmodule`)
  status: supported
  extracted_bucket: modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Module
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_modules
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: protocols-defprotocol
  name: Protocols (`defprotocol`)
  status: partial
  extracted_bucket: modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Module
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_modules
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
  rationale: Protocol declarations are extracted and merged into generic Module nodes,
    but the persisted graph does not retain the `defprotocol` kind needed for end-to-end
    protocol-specific queries.
- id: protocol-implementations-defimpl
  name: Protocol implementations (`defimpl`)
  status: partial
  extracted_bucket: modules
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Module
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_modules
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
  rationale: Protocol implementations are extracted, but the graph merges them into undifferentiated
    Module nodes and drops the `defimpl` type marker.
- id: use-import-alias-require
  name: Use/import/alias/require
  status: supported
  extracted_bucket: imports
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: IMPORTS
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_imports
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: dot-notation-calls
  name: Dot-notation calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_calls
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: simple-function-calls
  name: Simple function calls
  status: supported
  extracted_bucket: function_calls
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: relationship
    target: CALLS
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_calls
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: module-attributes-attr
  name: Module attributes (`@attr`)
  status: unsupported
  extracted_bucket: variables
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: tests/unit/parsers/test_elixir_parser.py::test_parse_elixir_module_attributes_not_extracted
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_module_attributes_not_persisted
  rationale: Module attributes are not emitted into the normalized parser payload, and
    the graph has no dedicated variable or metadata surface for them.
known_limitations:
- Multiple function clause heads for the same function are each captured as separate
  entries
- Pipe operator (`|>`) chains are not collapsed into a single call chain node
- GenServer callbacks are not distinguished from regular function definitions
