language: elixir
title: Elixir Parser
family: language
parser: DefaultEngine (elixir)
parser_entrypoint: go/internal/parser/elixir_dart_language.go
doc_path: docs/docs/languages/elixir.md
fixture_repo: tests/fixtures/ecosystems/elixir_comprehensive/
unit_test_file: go/internal/parser/engine_elixir_semantics_test.go
integration_test_suite: tests/integration/test_language_graph.py::TestElixirGraph
capabilities:
- id: functions-def-defp
  name: Functions (`def`/`defp`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: go/internal/parser/engine_elixir_semantics_test.go::TestDefaultEngineParsePathElixirFunctionMetadata
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: macros-defmacro-defmacrop
  name: Macros (`defmacro`/`defmacrop`)
  status: supported
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: node
    target: Function
  unit_test: go/internal/parser/engine_elixir_semantics_test.go::TestDefaultEngineParsePathElixirFunctionMetadata
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_runtime_surface
- id: guards-defguard-defguardp
  name: Guards (`defguard`/`defguardp`)
  status: partial
  extracted_bucket: functions
  required_fields:
  - name
  - line_number
  graph_surface:
    kind: none
    target: not_persisted
  unit_test: go/internal/parser/engine_elixir_semantics_test.go::TestDefaultEngineParsePathElixirFunctionMetadata
  integration_test: tests/integration/test_language_graph.py::TestElixirGraph::test_guard_definitions_not_persisted_as_functions
  rationale: The Go parser emits guard definitions into the normalized `functions`
    bucket, but the graph surface does not yet persist them as Function nodes end
    to end.
- id: delegated-functions-defdelegate
  name: Delegated functions (`defdelegate`)
  status: supported
  extracted_bucket: functions
  required_fields:
